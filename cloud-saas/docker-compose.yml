# ==========================================
# AeroSync з”ҹдә§жөӢиҜ•йғЁзҪІ
# з»„жҲҗпјҡPostgreSQL + Redis + API + Worker + Nginx
# з”Ёжі•пјҡdocker compose up -d --build
# ==========================================

version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: aerosync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aerosync
      POSTGRES_PASSWORD: aerosync_pass
      POSTGRES_DB: aerosync
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aerosync -d aerosync"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aerosync-net

  redis:
    image: redis:7-alpine
    container_name: aerosync-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aerosync-net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: aerosync-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://aerosync:aerosync_pass@postgres:5432/aerosync
      - REDIS_URL=redis://redis:6379/0
      - API_TOKEN=${API_TOKEN:-change-me-in-production}
      - STORAGE_TYPE=${STORAGE_TYPE:-oss}
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID:-}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET:-}
      - OSS_ENDPOINT=${OSS_ENDPOINT:-oss-cn-shanghai.aliyuncs.com}
      - OSS_BUCKET=${OSS_BUCKET:-aerosync-dev}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-aerosync}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - CLAUDE_BASE_URL=${CLAUDE_BASE_URL:-https://api.anthropic.com/v1}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-5-sonnet-20241022}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434/v1}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:14b}
      - DEFAULT_WEBHOOK_URL=${DEFAULT_WEBHOOK_URL:-}
      - DEFAULT_WEBHOOK_SECRET=${DEFAULT_WEBHOOK_SECRET:-}
      - ENABLE_HYBRID_PARSER=${ENABLE_HYBRID_PARSER:-false}
      - DINGTALK_WEBHOOK=${DINGTALK_WEBHOOK:-}
      - DINGTALK_SECRET=${DINGTALK_SECRET:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aerosync-net
    volumes:
      - ./api/static:/app/api/static:ro

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: aerosync-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://aerosync:aerosync_pass@postgres:5432/aerosync
      - REDIS_URL=redis://redis:6379/0
      - API_TOKEN=${API_TOKEN:-change-me-in-production}
      - STORAGE_TYPE=${STORAGE_TYPE:-oss}
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID:-}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET:-}
      - OSS_ENDPOINT=${OSS_ENDPOINT:-oss-cn-shanghai.aliyuncs.com}
      - OSS_BUCKET=${OSS_BUCKET:-aerosync-dev}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-aerosync}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - CLAUDE_BASE_URL=${CLAUDE_BASE_URL:-https://api.anthropic.com/v1}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-5-sonnet-20241022}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434/v1}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:14b}
      - DEFAULT_WEBHOOK_URL=${DEFAULT_WEBHOOK_URL:-}
      - DEFAULT_WEBHOOK_SECRET=${DEFAULT_WEBHOOK_SECRET:-}
      - ENABLE_HYBRID_PARSER=${ENABLE_HYBRID_PARSER:-false}
      - DINGTALK_WEBHOOK=${DINGTALK_WEBHOOK:-}
      - DINGTALK_SECRET=${DINGTALK_SECRET:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aerosync-net

  nginx:
    image: nginx:alpine
    container_name: aerosync-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./downloads:/usr/share/nginx/html/downloads:ro
    depends_on:
      - api
    networks:
      - aerosync-net

volumes:
  pg_data:

networks:
  aerosync-net:
    driver: bridge
